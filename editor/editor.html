// easing: 0 = ease-out (fast start, slow end), 0.5 = symmetric, 1 = ease-in (slow start, fast end)
function drawEasingCurve(canvas, easing) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Draw a bezier from bottom-left to top-right
  // Control point Y determines the curve shape
  const cp1y = h - (1 - easing) * h;  // First control point
  const cp2y = easing * h;             // Second control point

  // Background line (straight = constant speed reference)
  ctx.strokeStyle = '#2a3654';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(2, h - 2);
  ctx.lineTo(w - 2, 2);
  ctx.stroke();

  // The easing curve
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(2, h - 2);
  ctx.bezierCurveTo(w * 0.33, cp1y, w * 0.67, cp2y, w - 2, 2);
  ctx.stroke();

  // Dot showing the control point area
  const dotY = (cp1y + cp2y) / 2;
  ctx.fillStyle = '#3b82f6';
  ctx.beginPath();
  ctx.arc(w / 2, dotY, 3, 0, Math.PI * 2);
  ctx.fill();
}

// Override saveMotion to use sequencer keyframes if present
function buildMotionFromSequencer() {
  if (seqKeyframes.length === 0) return null;

  const duration = seqKeyframes.length === 1 ?
    10.0 :  // Single pose = 10s static
    seqKeyframes[seqKeyframes.length - 1].time;

  // Collect all param IDs across keyframes
  const allParams = new Set();
  const allParts = new Set();
  for (const kf of seqKeyframes) {
    Object.keys(kf.params).forEach(p => allParams.add(p));
    Object.keys(kf.parts).forEach(p => allParts.add(p));
  }

  const curves = [];

  // Build bezier curves for each parameter
  for (const paramId of allParams) {
    // Skip physics-driven params (KAMIYURE)
    if (paramId.toUpperCase().includes('KAMIYURE')) continue;

    const points = [];
    for (const kf of seqKeyframes) {
      if (kf.params[paramId] !== undefined) {
        points.push([kf.time, kf.params[paramId]]);
      }
    }

    if (points.length === 0) continue;

    // Ensure endpoints
    if (points[0][0] > 0) {
      points.unshift([0, points[0][1]]);
    }
    if (points[points.length - 1][0] < duration) {
      points.push([duration, points[points.length - 1][1]]);
    }

    // Build bezier segments
    const segments = [];
    for (let i = 0; i < points.length; i++) {
      const [t, v] = points[i];
      if (i === 0) {
        segments.push(round4(t), round6(v));
      } else {
        const [pt, pv] = points[i - 1];
        const dt = t - pt;
        segments.push(
          1,  // bezier
          round4(pt + dt * 0.4), round6(pv),   // cp1
          round4(pt + dt * 0.6), round6(v),    // cp2
          round4(t), round6(v),                 // end
        );
      }
    }

    curves.push({ Target: 'Parameter', Id: paramId, Segments: segments });
  }

  // Part opacity curves (stepped — instant switch)
  for (const partId of allParts) {
    const points = [];
    for (const kf of seqKeyframes) {
      if (kf.parts[partId] !== undefined) {
        points.push([kf.time, kf.parts[partId]]);
      }
    }
    if (points.length === 0) continue;

    if (points[0][0] > 0) points.unshift([0, points[0][1]]);
    if (points[points.length - 1][0] < duration) {
      points.push([duration, points[points.length - 1][1]]);
    }

    const segments = [];
    for (let i = 0; i < points.length; i++) {
      const [t, v] = points[i];
      if (i === 0) {
        segments.push(round4(t), round6(v));
      } else {
        segments.push(2, round4(t), round6(v));  // stepped
      }
    }
    curves.push({ Target: 'PartOpacity', Id: partId, Segments: segments });
  }

  return {
    Version: 3,
    Meta: {
      Duration: round4(duration),
      Fps: 30.0,
      Loop: true,
      AreBeziersRestricted: true,
      CurveCount: curves.length,
      TotalSegmentCount: curves.reduce((s, c) => s + c.Segments.length, 0),
      TotalPointCount: curves.reduce((s, c) => s + c.Segments.length, 0),
      UserDataCount: 0,
      TotalUserDataSize: 0,
    },
    Curves: curves,
  };
}

function round4(v) { return Math.round(v * 10000) / 10000; }
function round6(v) { return Math.round(v * 1000000) / 1000000; }

// ============================================================
//  Utilities
// ============================================================

function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  const textEl = document.getElementById('status-text');
  dot.className = 'dot' + (state === 'ready' ? ' ready' : state === 'loading' ? ' loading' : '');
  textEl.textContent = text;
}

function toast(message, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = message;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; }, 2500);
  setTimeout(() => el.remove(), 3000);
}

// ============================================================
//  Boot
// ============================================================

window.addEventListener('DOMContentLoaded', () => {
  init();
  initSequencer();
});

// Handle resize
window.addEventListener('resize', () => {
  if (!pixiApp || !live2dModel) return;
  const wrap = document.getElementById('canvas-wrap');
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  pixiApp.renderer.resize(w, h);
  const scale = Math.min(
    (w * 0.8) / live2dModel.width,
    (h * 0.85) / live2dModel.height
  );
  live2dModel.scale.set(scale);
  live2dModel.x = w / 2;
  live2dModel.y = h * 0.55;
});
